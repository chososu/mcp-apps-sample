<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Logging Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      overflow: hidden;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 14px;
      color: #888;
    }
    #app { display: none; height: 100%; flex-direction: column; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
    }
    .header-info {
      font-size: 11px;
      color: #888;
    }
    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .log-entry {
      display: flex;
      padding: 4px 12px;
      font-size: 12px;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      line-height: 1.6;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .log-entry:hover { background: #2a2d2e; }
    .log-entry.selected {
      background: #264f78;
      border-left-color: #007acc;
    }
    .log-entry .timestamp {
      color: #6a9955;
      min-width: 200px;
      flex-shrink: 0;
    }
    .log-entry .severity {
      min-width: 80px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .log-entry .message {
      white-space: pre-wrap;
      word-break: break-all;
      flex: 1;
    }
    .severity-DEFAULT { color: #d4d4d4; }
    .severity-DEBUG { color: #888888; }
    .severity-INFO { color: #4fc1ff; }
    .severity-NOTICE { color: #4fc1ff; }
    .severity-WARNING { color: #cca700; }
    .severity-ERROR { color: #f44747; }
    .severity-CRITICAL { color: #ff0000; font-weight: 700; }
    .severity-ALERT { color: #ff0000; font-weight: 700; }
    .severity-EMERGENCY { color: #ff0000; background: #3c0000; font-weight: 700; }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #007acc;
      color: #ffffff;
      font-size: 12px;
      flex-shrink: 0;
    }
    .footer-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    .footer-btn:hover { background: rgba(255,255,255,0.3); }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading logs...</div>
  <div id="app">
    <div class="header">
      <span class="header-title" id="header-title">Cloud Logging Viewer</span>
      <span class="header-info" id="header-info"></span>
    </div>
    <div class="log-container" id="log-container"></div>
    <div class="footer">
      <span id="footer-status">Click log entries to select</span>
    </div>
  </div>
  <script type="module" src="./src/mcp-app.ts"></script>
</body>
</html>
